/* ════ AI ════ */
async function aiRecognize(apiKey, imgB64, type) {
  if (!apiKey) throw new Error("請先在「設定」填入 Anthropic API Key");
  const PROMPTS = {
    beans_batch:`你是咖啡豆進貨辨識助手，擅長辨識繁體中文、簡體中文、英文進貨單。這張圖片可能是進貨發票或出貨單，上面有多個品項（最多10個）。請仔細辨識所有品項，只回傳JSON陣列，不加任何說明：
[{"name":"品名","country":"產地","productionDate":"YYYY-MM-DD","size":"半磅或一磅或五磅","quantity":數量數字,"unitPrice":單價數字,"note":"備註"}]`,
    drip:`辨識濾掛包裝或進貨單，只回傳JSON：{"name":"品名","purchaseDate":"YYYY-MM-DD","quantity":數量,"unitPrice":單價,"note":"備註"}`,
    enzyme:`辨識酵素商品標籤或進貨單，只回傳JSON：{"name":"品名","quantity":數量,"unitPrice":單價,"purchaseDate":"YYYY-MM-DD","note":"備註"}`,
    accounting:`辨識收據發票（繁體中文、統一發票均可），只回傳JSON：{"merchant":"商家","amount":金額數字,"currency":"TWD/USD/JPY","date":"YYYY-MM-DD","category":"beans_in/equip_in/utilities/rent/supplies/equip_buy/telecom/marketing之一","note":"備註"}`,
    revenue:`辨識營業收入收據或日結單，只回傳JSON：{"date":"YYYY-MM-DD","description":"收入說明","amount":金額數字,"note":"備註"}`
  };
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,messages:[{role:"user",content:[
      {type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgB64}},
      {type:"text",text:PROMPTS[type]}
    ]}]})
  });
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(`API錯誤 ${res.status}: ${e?.error?.message||"請稍後再試"}`);}
  const data=await res.json();
  const raw=data.content?.map(i=>i.text||"").join("")||"";
  for(const s of [raw.trim(),raw.replace(/```json\s*/gi,"").replace(/```/g,"").trim(),raw.match(/[\[{][\s\S]*[\]}]/)?.[0]||""]){
    try{if(s)return JSON.parse(s);}catch{}
  }
  throw new Error(`格式異常：${raw.slice(0,150)}`);
}

/* ════ CONFIRM DIALOG ════ */
function ConfirmDialog({config,onClose}){
  const [step,setStep]=useState(0);
  useEffect(()=>{if(!config)setStep(0);},[config]);
  if(!config)return null;
  const isTriple=config.triple;
  const colors=["#6B3D1E","#C05020","#8B0000"];
  const labels=["確認刪除","⚠️ 再次確認","🗑️ 最終確認（無法復原）"];
  const handleOk=()=>{if(isTriple&&step<2){setStep(s=>s+1);return;}config.onConfirm();onClose();setStep(0);};
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <Card style={{maxWidth:340,width:"100%",borderColor:isTriple?`${colors[step]}44`:T.primary+"44"}}>
        <div style={{fontSize:22,textAlign:"center",marginBottom:10}}>{isTriple?"🗑️":"✅"}</div>
        <div style={{fontSize:15,fontWeight:700,textAlign:"center",marginBottom:8}}>{config.title}</div>
        <div style={{fontSize:13,color:T.textMid,textAlign:"center",marginBottom:16,lineHeight:1.6,whiteSpace:"pre-line"}}>{config.message}</div>
        {isTriple&&step>0&&(
          <div style={{fontSize:12,color:colors[step],fontWeight:700,textAlign:"center",padding:"7px 10px",background:colors[step]+"11",borderRadius:8,border:`1px solid ${colors[step]}33`,marginBottom:12}}>
            第{step+1}/3次確認{step===2?" — 此操作無法復原！":""}
          </div>
        )}
        <div style={{display:"flex",gap:10}}>
          <button onClick={()=>{onClose();setStep(0);}} style={{flex:1,padding:"10px 0",borderRadius:9,border:`1.5px solid ${T.border}`,background:"transparent",color:T.textMid,fontWeight:600,fontSize:13,cursor:"pointer"}}>取消</button>
          <button onClick={handleOk} style={{flex:1,padding:"10px 0",borderRadius:9,border:"none",background:isTriple?colors[step]:T.primary,color:"#FFF",fontWeight:700,fontSize:13,cursor:"pointer"}}>
            {isTriple?labels[step]:"確認"}
          </button>
        </div>
      </Card>
    </div>
  );
}

/* ════ IMAGE UPLOAD ════ */
function ImageUpload({onRecognize,loading,aiStatus,setAiStatus,hasKey}){
  const fileRef=useRef();
  const [preview,setPreview]=useState(null);
  const handleFile=e=>{const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{setPreview(ev.target.result);setAiStatus?.(null);};r.readAsDataURL(file);};
  return(
    <div>
      {preview?(
        <div style={{borderRadius:12,overflow:"hidden",border:`1.5px solid ${T.cardBorder}`}}>
          <img src={preview} alt="" style={{width:"100%",maxHeight:200,objectFit:"contain",background:"#F9F5EE",display:"block"}}/>
          <div style={{display:"flex",gap:8,padding:10,background:"#FFF"}}>
            {hasKey
              ?<PBtn onClick={()=>onRecognize(preview.split(",")[1])} disabled={loading} sm>{loading?"⏳ AI辨識中…":"🤖 AI自動辨識（支援中文）"}</PBtn>
              :<div style={{fontSize:12,color:"#B04848",padding:"8px 0"}}>⚠️ 請先在「設定」填入 API Key</div>
            }
            <GBtn onClick={()=>{setPreview(null);fileRef.current.value="";}} sm>重選</GBtn>
          </div>
        </div>
      ):(
        <div onClick={()=>fileRef.current?.click()} style={{border:`2px dashed ${T.primary}55`,borderRadius:12,padding:"18px 0",textAlign:"center",cursor:"pointer",background:T.primaryLight}}>
          <div style={{fontSize:26,marginBottom:4}}>📷</div>
          <div style={{fontSize:13,fontWeight:700,color:T.primary,marginBottom:2}}>拍照或上傳圖片</div>
          <div style={{fontSize:11,color:T.textLight}}>支援中文、英文收據、標籤、發票</div>
        </div>
      )}
      <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handleFile} style={{display:"none"}}/>
      {aiStatus&&(
        <div style={{marginTop:8,padding:"9px 12px",borderRadius:9,background:aiStatus.type==="error"?"#FFF0F0":"#F0FFF4",border:`1.5px solid ${aiStatus.type==="error"?"#FFCDD2":"#C8E6C9"}`}}>

          {aiStatus.type==="error"&&<div style={{fontSize:11,color:"#B71C1C",marginTop:3,wordBreak:"break-all"}}>{aiStatus.message}</div>}
        </div>
      )}
    </div>
  );
}

/* ════ FIREBASE SETUP SCREEN ════ */
function FirebaseSetup({onSave}){
  const [raw,setRaw]=useState("");
  const [err,setErr]=useState("");
  const handle=()=>{
    try{
      let clean=raw.trim();
      // 取出 { ... } 之間的內容
      const m=clean.match(/\{[\s\S]*\}/);
      if(!m){setErr("找不到設定碼，請確認有包含 { } 的完整內容");return;}
      clean=m[0];
      // 把 JS 物件格式轉成 JSON（處理 key 沒有引號、尾端逗號、註解）
      const jsonStr=clean
        .replace(/\/\/[^\n]*/g,"")
        .replace(/\/\*[\s\S]*?\*\//g,"")
        .replace(/([{,]\s*)([a-zA-Z_$][a-zA-Z0-9_$]*)(\s*:)/g,'$1"$2"$3')
        .replace(/,(\s*[}\]])/g,"$1");
      const cfg=JSON.parse(jsonStr);
      if(!cfg.apiKey||!cfg.projectId){setErr("格式不正確，請確認包含 apiKey 和 projectId");return;}
      onSave(cfg);
    }catch(e){setErr("解析失敗，請重新複製貼上完整的 firebaseConfig 內容。錯誤："+e.message);}
  };
  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#F0E8DA,#F4EFE6)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Noto Sans TC',sans-serif"}}>

      <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:18,color:T.primary,fontWeight:700,marginBottom:4}}>野人獻曝咖啡</div>
      <div style={{fontSize:12,color:T.textLight,marginBottom:28,letterSpacing:"0.08em"}}>店面庫存管理系統 v5</div>

      <Card style={{maxWidth:440,width:"100%"}}>
        <div style={{fontSize:14,fontWeight:700,color:T.primary,marginBottom:8}}>🔥 設定 Firebase 雲端同步</div>
        <div style={{fontSize:12,color:T.textMid,marginBottom:16,lineHeight:1.8}}>
          請前往 <a href="https://console.firebase.google.com" target="_blank" style={{color:T.primary,fontWeight:700}}>console.firebase.google.com</a> 建立專案，取得 Firebase 設定碼後貼在下方。<br/>
          <span style={{color:"#3A7D5A",fontWeight:700}}>詳細步驟請看「設定教學.html」</span>
        </div>
        <label style={{display:"flex",flexDirection:"column",gap:6,marginBottom:14}}>
          <Lbl c="貼上 Firebase 設定碼（firebaseConfig）"/>

            style={{background:"#FAF7F2",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"10px 12px",color:T.text,fontSize:12,outline:"none",fontFamily:"'DM Mono',monospace",resize:"vertical",lineHeight:1.6}}/>

/* ════ MAIN APP ════ */
function App(){
  const [isLoggedIn,setIsLoggedIn]=useState(false);
  const [fbReady,setFbReady]=useState(false);
  const [fbError,setFbError]=useState("");
  const [tab,setTab]=useState("home");
  const [beans,setBeans]=useState([]);
  const [drip,setDrip]=useState([]);
  const [enzyme,setEnzyme]=useState([]);
  const [acct,setAcct]=useState([]);
  const [revenue,setRevenue]=useState([]);
  const [apiKey,setApiKey]=useState(()=>LS.get("wc5_apikey",""));
  const [toast,setToast]=useState(null);
  const [confirm,setConfirm]=useState(null);
  const [syncing,setSyncing]=useState(false);

  /* Init Firebase with hardcoded config */
  useEffect(()=>{
    const ok=initFirebase(FIREBASE_CONFIG);
    if(!ok){setFbError("Firebase 連線失敗，請確認網路連線");setFbReady(false);return;}
    setFbReady(true);setFbError("");
  },[]);

  /* Real-time listeners */
  useEffect(()=>{
    if(!fbReady||!db)return;
    const unsubs=[];
    const listen=(col,setter)=>{
      const unsub=db.collection(col).onSnapshot(snap=>{
        const data=snap.docs.map(d=>({...d.data(),id:d.id}));
        setter(data);setSyncing(false);
      },err=>{console.error(col,err);setSyncing(false);});
      unsubs.push(unsub);
    };
    setSyncing(true);
    listen("beans",setBeans);
    listen("drip",setDrip);
    listen("enzyme",setEnzyme);
    listen("acct",setAcct);
    listen("revenue",setRevenue);
    return()=>unsubs.forEach(u=>u());
  },[fbReady]);

  /* DB operations */
  const dbAdd=async(col,item)=>{
    const id=String(item.id||Date.now());
    await db.collection(col).doc(id).set({...item,id});
  };
  const dbDel=async(col,id)=>{
    await db.collection(col).doc(String(id)).delete();
  };
  const dbSet=async(col,items)=>{
    // bulk replace: delete all then add (for import)
    const batch=db.batch();
    const snap=await db.collection(col).get();
    snap.docs.forEach(d=>batch.delete(d.ref));
    items.forEach(item=>batch.set(db.collection(col).doc(String(item.id)),{...item,id:String(item.id)}));
    await batch.commit();
  };

  const showToast=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),3500);};
  const showConfirm=cfg=>setConfirm(cfg);
  const closeConfirm=()=>setConfirm(null);

  const saveApiKey=k=>{setApiKey(k);LS.set("wc5_apikey",k);};

  if(!isLoggedIn){
    return <LoginScreen onLogin={()=>setIsLoggedIn(true)}/>;
  }

  if(!fbReady){
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#F0E8DA,#F4EFE6)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Noto Sans TC',sans-serif",padding:20}}>
        <div style={{fontSize:40,marginBottom:12}}>☕</div>
        <div style={{fontSize:14,color:T.primary,fontWeight:700,marginBottom:8}}>連線中...</div>
        {fbError&&<div style={{fontSize:13,color:"#B04848",textAlign:"center",maxWidth:300}}>{fbError}</div>}
      </div>
    );
  }

  const monthRevenue=revenue.filter(r=>r.date?.slice(0,7)===thisMonth()).reduce((s,r)=>s+(Number(r.amount)||0),0);
  const monthAcct=acct.filter(e=>e.date?.slice(0,7)===thisMonth()).reduce((s,e)=>s+(Number(e.amount)||0),0);

  const TABS=[
    {id:"home",icon:"🏠",label:"首頁"},
    {id:"inventory",icon:"📦",label:"庫存"},
    {id:"accounting",icon:"💰",label:"帳務"},
    {id:"revenue",icon:"📈",label:"營收"},
    {id:"settings",icon:"⚙️",label:"設定"},
  ];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#F0E8DA 0%,#F4EFE6 60%,#EDE5D8 100%)",fontFamily:"'Noto Sans TC','DM Sans',sans-serif",color:T.text,paddingBottom:90}}>
      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:100,background:"rgba(107,61,30,0.97)",backdropFilter:"blur(12px)",padding:"13px 18px 11px",boxShadow:"0 2px 20px rgba(107,61,30,0.3)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:24}}>☕</span>
            <div>
              <div style={{fontFamily:"'Noto Serif TC',serif",fontSize:15,color:"#FFF8F0",fontWeight:700}}>野人獻曝咖啡</div>
              <div style={{fontSize:10,color:"#D4A96A",letterSpacing:"0.1em"}}>店面庫存管理系統 v5.2</div>
            </div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            {syncing&&<div style={{fontSize:10,color:"#D4A96A",animation:"pulse 1s infinite"}}>⏳ 同步中</div>}
            <div style={{fontSize:10,color:"#6EE7B7",fontWeight:700}}>🔴 雲端同步中</div>
          </div>
        </div>
      </div>

      {toast&&<div style={{position:"fixed",top:70,left:"50%",transform:"translateX(-50%)",background:toast.type==="error"?"#7F1D1D":"#14532D",color:toast.type==="error"?"#FCA5A5":"#BBF7D0",padding:"10px 22px",borderRadius:12,zIndex:999,fontSize:13,fontWeight:600,boxShadow:"0 4px 24px rgba(0,0,0,0.3)",whiteSpace:"nowrap"}}>{toast.msg}</div>}

      <ConfirmDialog config={confirm} onClose={closeConfirm}/>

      <div style={{maxWidth:720,margin:"0 auto",padding:"14px 12px"}}>
        {tab==="home"       &&<HomePage beans={beans} drip={drip} enzyme={enzyme} revenue={revenue} monthRevenue={monthRevenue} monthAcct={monthAcct} setTab={setTab}/>}
        {tab==="inventory"  &&<InventoryPage beans={beans} drip={drip} enzyme={enzyme} dbAdd={dbAdd} dbDel={dbDel} showToast={showToast} showConfirm={showConfirm} apiKey={apiKey}/>}
        {tab==="accounting" &&<AccountingPage acct={acct} dbAdd={dbAdd} dbDel={dbDel} showToast={showToast} showConfirm={showConfirm} apiKey={apiKey}/>}
        {tab==="revenue"    &&<RevenuePage revenue={revenue} dbAdd={dbAdd} dbDel={dbDel} showToast={showToast} showConfirm={showConfirm} monthRevenue={monthRevenue} apiKey={apiKey}/>}
        {tab==="settings"   &&<SettingsPage apiKey={apiKey} saveApiKey={saveApiKey} showToast={showToast} showConfirm={showConfirm} beans={beans} drip={drip} enzyme={enzyme} acct={acct} revenue={revenue} dbSet={dbSet}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"rgba(255,255,255,0.97)",borderTop:`2px solid ${T.cardBorder}`,display:"flex",justifyContent:"center",boxShadow:"0 -2px 16px rgba(100,60,20,0.1)"}}>
        <div style={{display:"flex",maxWidth:720,width:"100%"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"11px 0 8px",border:"none",background:"transparent",borderTop:`3px solid ${tab===t.id?T.primary:"transparent"}`,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:19}}>{t.icon}</span>
              <span style={{fontSize:10,fontWeight:700,color:tab===t.id?T.primary:T.textLight}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

  const [filterSize,setFilterSize]=useState("全部");const [batchItems,setBatchItems]=useState([]);
  const [form,setForm]=useState({name:"",country:"",productionDate:"",size:"半磅",quantity:"",unitPrice:"",note:"",purchaseDate:today()});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const COLOR="#7B4F2E";
  const emptyItem=()=>({name:"",country:"",productionDate:"",size:"半磅",quantity:"",unitPrice:"",note:"",purchaseDate:today()});

  const onRecognize=async b64=>{
    setLoading(true);setAiStatus(null);
    try{const r=await aiRecognize(apiKey,b64,"beans_batch");const arr=Array.isArray(r)?r:[r];
      setBatchItems(arr.map(i=>({name:i.name||"",country:i.country||"",productionDate:i.productionDate||"",size:BEAN_SIZES.includes(i.size)?i.size:"半磅",quantity:String(i.quantity||""),unitPrice:String(i.unitPrice||""),note:i.note||"",purchaseDate:today()})));

    catch(e){setAiStatus({type:"error",message:e.message});}
    setLoading(false);
  };

  const updBatch=(idx,k,v)=>setBatchItems(p=>p.map((it,i)=>i===idx?{...it,[k]:v}:it));

  const confirmBatch=()=>{

      onConfirm:async()=>{
        for(const i of batchItems){const id=Date.now()+Math.random();await dbAdd(col,{...i,id,quantity:parseFloat(i.quantity)||0,unitPrice:parseFloat(i.unitPrice)||0,createdAt:new Date().toISOString()});}

          <ImageUpload onRecognize={onRecognize} loading={loading} aiStatus={aiStatus} setAiStatus={setAiStatus} hasKey={!!apiKey}/>
          <div style={{height:12}}/><div style={{display:"flex",flexDirection:"column",gap:9}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}><Field label="日期 *" type="date" value={form.date} onChange={v=>set("date",v)}/><Field label="金額 NT$ *" value={form.amount} onChange={v=>set("amount",v)} placeholder="0" mono/></div>
            <Field label="收入說明 *" value={form.description} onChange={v=>set("description",v)} placeholder="當日門市營業額、外送收入…"/>
            <Field label="備註" value={form.note} onChange={v=>set("note",v)} placeholder="選填…"/>
            <PBtn onClick={confirmAdd} full green>💾 新增營收記錄</PBtn>
          </div>
        </Card>
      )}
      {mode==="list"&&(dates.length===0?<div style={{textAlign:"center",color:T.textLight,padding:"40px 0",fontSize:13}}>尚無營收記錄</div>
        :dates.map(date=>{const dayItems=grouped[date];const dayTotal=dayItems.reduce((s,r)=>s+(Number(r.amount)||0),0);return(
          <div key={date} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",background:"#E7F5ED",borderRadius:9,marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:700,color:"#3A7D5A"}}>📅 {date}</span>
              <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:"#3A7D5A"}}>{fmt(dayTotal)}</span>
            </div>
            {dayItems.map(r=>(
              <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",background:T.card,border:`1.5px solid ${T.cardBorder}`,borderRadius:12,marginBottom:6,boxShadow:T.shadow}}>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>{r.description}</div>{r.note&&<div style={{fontSize:11,color:T.textLight}}>{r.note}</div>}</div>
                <div style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:"#3A7D5A",flexShrink:0}}>{fmt(r.amount)}</div>
                <button onClick={()=>showConfirm({title:"確認刪除",message:"刪除此筆營收？",triple:true,onConfirm:async()=>{await dbDel("revenue",r.id);showToast("已刪除");}})} style={{background:"none",border:"none",color:"#C0A090",cursor:"pointer",fontSize:13,padding:"0 2px"}}>✕</button>
              </div>
            ))}
          </div>
        );})
      )}
    </div>
  );
}

/* ════ SETTINGS ════ */
function SettingsPage({apiKey,saveApiKey,showToast,showConfirm,beans,drip,enzyme,acct,revenue,dbSet}){
  const [key,setKey]=useState(apiKey);const [showKey,setShowKey]=useState(false);
  const [backupLog,setBackupLog]=useState(()=>LS.get("wc5_backuplog",[]));
  const importRef=useRef();
  const fmtDate=iso=>{if(!iso)return"";const d=new Date(iso);return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;};

  const exportBackup=()=>{
    const dateStr=new Date().toISOString().slice(0,10).replace(/-/g,"");
    const todayBak=backupLog.filter(b=>b.dateStr===dateStr&&b.type!=="import");
    const ver=todayBak.length+1;const verStr=`v${String(ver).padStart(2,"0")}`;
    const total=beans.length+drip.length+enzyme.length+acct.length+revenue.length;
    const filename=`野人咖啡備份_${dateStr}_${verStr}.json`;
    const payload={meta:{appName:"野人獻曝咖啡店面庫存管理系統",version:"v5",exportedAt:new Date().toISOString(),dateStr,ver,verStr,filename,summary:{beans:beans.length,drip:drip.length,enzyme:enzyme.length,acct:acct.length,revenue:revenue.length,total}},data:{beans,drip,enzyme,acct,revenue}};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=filename;a.click();URL.revokeObjectURL(url);
    const logEntry={id:Date.now(),dateStr,ver,verStr,filename,exportedAt:new Date().toISOString(),type:"export",summary:payload.meta.summary};
    const newLog=[logEntry,...backupLog].slice(0,20);setBackupLog(newLog);LS.set("wc5_backuplog",newLog);
    showToast(`✅ 已匯出：${filename}`);
  };

  const importBackup=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const payload=JSON.parse(ev.target.result);
        if(!payload.data||!payload.meta){showToast("格式錯誤，非有效備份檔","error");return;}
        const {beans:b,drip:d,enzyme:en,acct:a,revenue:rv}=payload.data;
        showConfirm({title:"確認匯入備份",message:`匯入「${payload.meta.filename}」\n共 ${payload.meta.summary?.total||0} 筆資料。\n⚠️ 雲端現有資料將被覆蓋，所有手機同步！`,
          onConfirm:async()=>{
            if(b?.length)await dbSet("beans",b);if(d?.length)await dbSet("drip",d);
            if(en?.length)await dbSet("enzyme",en);if(a?.length)await dbSet("acct",a);if(rv?.length)await dbSet("revenue",rv);
            const logEntry={id:Date.now(),dateStr:new Date().toISOString().slice(0,10).replace(/-/g,""),filename:payload.meta.filename,importedAt:new Date().toISOString(),type:"import",summary:payload.meta.summary};
            const newLog=[logEntry,...backupLog].slice(0,20);setBackupLog(newLog);LS.set("wc5_backuplog",newLog);
            showToast(`✅ 已還原：${payload.meta.filename}`);
          }
        });
      }catch{showToast("讀取失敗，請確認檔案格式","error");}
      importRef.current.value="";
    };
    reader.readAsText(file);
  };

  return(
    <div style={{display:"flex",flexDirection:"column",gap:16}}>
      {/* Firebase status */}
      <Card style={{background:"#E7F5ED",borderColor:"#3A7D5A33"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#3A7D5A",marginBottom:6}}>🔥 Firebase 雲端同步</div>
        <div style={{fontSize:12,color:"#2E7D32"}}>✅ 已連線 ifreetimecafe-5dee3，所有手機資料即時同步中</div>
      </Card>

      {/* API Key */}
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:T.primary,borderLeft:`3px solid ${T.primary}`,paddingLeft:10,marginBottom:14}}>🤖 AI 辨識設定</div>
        <div style={{fontSize:12,color:T.textMid,marginBottom:14,lineHeight:1.7}}>Anthropic API Key（每支手機分別設定，只存在該手機本機）<br/><a href="https://console.anthropic.com" target="_blank" style={{color:T.primary,fontWeight:700}}>console.anthropic.com</a></div>
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input type={showKey?"text":"password"} value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-api…" style={{flex:1,background:"#FAF7F2",border:`1.5px solid ${T.border}`,borderRadius:10,padding:"11px 12px",color:T.text,fontSize:13,outline:"none",fontFamily:"'DM Mono',monospace"}}/>
          <button onClick={()=>setShowKey(s=>!s)} style={{padding:"11px 14px",borderRadius:10,border:`1.5px solid ${T.border}`,background:T.card,color:T.textMid,cursor:"pointer",fontSize:14}}>{showKey?"🙈":"👁️"}</button>
        </div>
        <PBtn onClick={()=>{saveApiKey(key.trim());showToast("✅ API Key 已儲存！");}} full>儲存 API Key</PBtn>
        {apiKey&&<div style={{fontSize:11,color:"#3A7D5A",textAlign:"center",marginTop:8,fontWeight:700}}>✅ API Key 已設定</div>}
      </Card>

      {/* 資料統計 */}
      <Card>
        <div style={{fontSize:13,fontWeight:700,color:T.primary,borderLeft:`3px solid ${T.primary}`,paddingLeft:10,marginBottom:14}}>📊 雲端資料統計</div>
        {[{label:"☕ 咖啡豆",count:beans.length,color:"#7B4F2E"},{label:"🫖 濾掛",count:drip.length,color:"#4A7C59"},{label:"🧴 酵素",count:enzyme.length,color:"#3A6EA5"},{label:"💰 帳務",count:acct.length,color:T.primary},{label:"📈 營收",count:revenue.length,color:"#3A7D5A"}].map(s=>(
          <div key={s.label} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:`1px solid ${T.border}`}}>
            <span style={{fontSize:13,color:T.textMid}}>{s.label}</span>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:14,fontWeight:700,color:s.color}}>{s.count} 筆</span>
          </div>
        ))}
        <div style={{display:"flex",justifyContent:"space-between",padding:"9px 0"}}>
          <span style={{fontSize:13,fontWeight:700,color:T.text}}>合計</span>
          <span style={{fontFamily:"'DM Mono',monospace",fontSize:15,fontWeight:700,color:T.primary}}>{beans.length+drip.length+enzyme.length+acct.length+revenue.length} 筆</span>
        </div>
      </Card>

      {/* 備份匯出 */}
      <Card style={{borderColor:"#3A6EA533"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#3A6EA5",borderLeft:"3px solid #3A6EA5",paddingLeft:10,marginBottom:12}}>📤 備份匯出</div>
        <div style={{fontSize:12,color:T.textMid,marginBottom:14,lineHeight:1.7}}>從雲端匯出所有資料為 JSON 備份檔。<br/><span style={{color:"#3A6EA5",fontWeight:700}}>檔名：野人咖啡備份_日期_版本號.json</span><br/>同一天多次備份自動遞增（v01、v02…）</div>
        <PBtn onClick={exportBackup} full>📥 立即匯出備份</PBtn>
      </Card>

      {/* 備份匯入 */}
      <Card style={{borderColor:"#4A7C5933"}}>
        <div style={{fontSize:13,fontWeight:700,color:"#4A7C59",borderLeft:"3px solid #4A7C59",paddingLeft:10,marginBottom:12}}>📂 匯入還原</div>
        <div style={{fontSize:12,color:T.textMid,marginBottom:14,lineHeight:1.7}}><span style={{color:"#B04848",fontWeight:700}}>⚠️ 匯入會覆蓋雲端所有資料，所有手機同步。</span><br/>建議先匯出備份再操作。</div>
        <button onClick={()=>importRef.current?.click()} style={{width:"100%",padding:"12px 0",borderRadius:11,border:"1.5px solid #4A7C59",background:"#EAF3ED",color:"#4A7C59",fontWeight:700,fontSize:14,cursor:"pointer"}}>📂 選擇備份檔案匯入</button>
        <input ref={importRef} type="file" accept=".json,application/json" onChange={importBackup} style={{display:"none"}}/>
      </Card>

      {/* 備份記錄 */}
      {backupLog.length>0&&(
        <Card>
          <div style={{fontSize:13,fontWeight:700,color:T.primary,borderLeft:`3px solid ${T.primary}`,paddingLeft:10,marginBottom:14}}>🗂️ 備份記錄（最近{backupLog.length}筆）</div>
          {backupLog.map((log,idx)=>(
            <div key={log.id||idx} style={{padding:"9px 0",borderBottom:`1px solid ${T.border}`,display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:log.type==="import"?"#4A7C59":"#3A6EA5",marginBottom:2}}>{log.type==="import"?"📂 匯入":"📤 匯出"} {log.filename}</div>
                <div style={{fontSize:11,color:T.textLight}}>{fmtDate(log.exportedAt||log.importedAt)}{log.summary&&` · ${log.summary.total||0}筆`}</div>
              </div>
              <div style={{fontSize:11,fontFamily:"'DM Mono',monospace",color:T.textLight,flexShrink:0}}>{log.verStr||""}</div>
            </div>
          ))}
        </Card>
      )}
      <div style={{textAlign:"center",fontSize:11,color:T.textLight,paddingBottom:8}}>野人獻曝咖啡店面庫存管理系統 v5<br/>🔥 Firebase 雲端同步版</div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
</body>
